apiVersion: v1
kind: ConfigMap
metadata:
    name: ${K8S_DEPLOYMENT}-config
    namespace: ${K8S_NAMESPACE}
data:
    APP_ENV: '${APP_ENV}'
    NODE_ENV: 'production'
    PORT: '3000'

    NEXT_PUBLIC_APP_ENV: '${APP_ENV}'
    NEXT_PUBLIC_APP_NAME: 'doe'
    NEXT_TELEMETRY_DISABLED: '1'

    NEXT_PUBLIC_API_BASE_URL: '/api'
    API_INTERNAL_BASE_URL: 'http://doe-api-${APP_ENV}-svc.back-end-java-${APP_ENV}.svc.cluster.local'
