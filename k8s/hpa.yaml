apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
    name: ${K8S_DEPLOYMENT}-hpa
    namespace: ${K8S_NAMESPACE}
spec:
    scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: ${K8S_DEPLOYMENT}
    minReplicas: ${HPA_MIN_REPLICAS}
    maxReplicas: ${HPA_MAX_REPLICAS}
    metrics:
        - type: Resource
          resource:
              name: cpu
              target:
                  type: Utilization
                  averageUtilization: ${HPA_CPU_AVG_UTILIZATION}
        - type: Resource
          resource:
              name: memory
              target:
                  type: Utilization
                  averageUtilization: ${HPA_MEMORY_AVG_UTILIZATION}
